 <div class="right">
            <h1>Checkout</h1>
            <div class="form">
                <div class="group">
                    <label for="name">Full Name:</label><br>
                    <input type="text" name="name" id="name" required>
                </div>
    
                <div class="group">
                    <label for="phone">Phone Number:</label><br>
                    <input type="text" name="phone" id="phone" required>
                </div>
					
				<div class="group">
                    <label for="cardname">Name on Card:</label><br>
                    <input type="text" name="cardname" id="cardname" required>
                </div>
				
				<div class="group">
                    <label for="card">Card Number:</label><br>
                    <input type="text" name="card" id="card" required>
                </div>
				
				<div class="group">
                    <label for="date">Expiration Date (ex.09/12):</label><br>
                    <input type="text" name="date" id="date" required>
                </div>
				
				<div class="group">
                    <label for="cvv">Security Code (CVV):</label><br>
                    <input type="text" name="cvv" id="cvv" required>
                </div>
    
                <div class="group">
                    <label for="address">Address:</label><br>
                    <input type="text" name="address" id="address" required>
                </div>
    
                <div class="group">
                    <label for="state">State:</label>
                    <select name="state" id="state">
                        <option value="">Choose..</option>
                        <option value="">Alabama</option>
                    </select>
                </div>
    
                <div class="group">
                    <label for="city">City:</label>
                    <select name="city" id="city">
                        <option value="">Choose..</option>
                        <option value="">Mobile AL</option>
                        <option value="">Saraland AL</option>
                        <option value="">Axis AL</option>
                        <option value="">Satsuma AL</option>
                        <option value="">Chickasaw AL</option>
                    </select>
                </div>
            </div>
			<div class="details">
            <div class="return">
                <div class="row">
                    <div>Total Quantity</div>
                    <div class="totalQuantity">9</div>
                </div>
                <div class="row">
                    <div>Total Price</div>
                    <div class="totalPrice">$1,209.91</div>
                </div>
            </div>
            </div>
			 <a href="orderconfirmation.html"><button class="placeorder" >Place Order</button></a>
			</div>
